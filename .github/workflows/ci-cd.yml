name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, master ]
  release:
    types: [published, created, edited]
  workflow_dispatch:  # Allow manual triggering
  schedule:
    # Weekly on Sundays
    - cron: '0 0 * * 0'

# Release Drafter Configuration
on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, reopened, synchronize]
  release:
    types: [published, created, edited]
  workflow_dispatch:

# Cancel in-progress runs when new commits are pushed

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  CACHE_VERSION: v1  # Bump this to invalidate cache
  DEFAULT_TIMEOUT_MINUTES: 15
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    steps:
      - name: Update Release Draft
        uses: release-drafter/release-drafter@v5
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  versioning:
    name: Version & Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, release-drafter]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Get current version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Check for version bump
        id: check-version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION="v${{ steps.version.outputs.version }}"
          
          if [ "$LATEST_TAG" != "$CURRENT_VERSION" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New version detected: $CURRENT_VERSION (previous: $LATEST_TAG)"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version change detected"
          fi

      - name: Generate release notes
        if: steps.check-version.outputs.should_release == 'true'
        id: release-notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RELEASE_NOTES=$(node scripts/generate-release-notes.js ${{ steps.version.outputs.version }} $PREVIOUS_TAG)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check-version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: true

  test:
    name: Test & Lint
    needs: versioning
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.DEFAULT_TIMEOUT_MINUTES }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]  # Test on multiple Node.js versions
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cache dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ env.CACHE_VERSION }}

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true  # Don't fail on audit issues, just report them

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [test, versioning]
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    timeout-minutes: ${{ env.DEFAULT_TIMEOUT_MINUTES }}
    env:
      NODE_ENV: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for version calculation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Get version from package.json
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: image=moby/buildkit:latest

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev fakeroot rpm jq zip
          npm install --legacy-peer-deps --no-package-lock

      - name: Get VSCode repository
        run: |
          git clone https://github.com/Microsoft/vscode.git
          cd vscode
          LATEST_MS_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "LATEST_MS_TAG=${LATEST_MS_TAG}" >> $GITHUB_ENV
          echo "Got the latest MS tag: ${LATEST_MS_TAG}"
          git checkout $LATEST_MS_TAG
          cd ..

      - name: Check if build needed
        id: check_tags
        run: |
          if git rev-parse $LATEST_MS_TAG >/dev/null 2>&1; then
            echo "Latest MS tag ${LATEST_MS_TAG} already exists in NeoAI. Skipping build"
            echo "should_build=no" >> $GITHUB_OUTPUT
          else
            echo "New MS tag found, continuing build"
            git config --local user.name "GitHub Actions"
            git config --local user.email "action@github.com"
            git tag $LATEST_MS_TAG
            echo "should_build=yes" >> $GITHUB_OUTPUT
          fi

      - name: Build VSCode Linux
        if: steps.check_tags.outputs.should_build == 'yes'
        run: |
          cd vscode
          npm install -g yarn gulp-cli
          yarn
          mv product.json product.json.bak
          cat product.json.bak | jq 'setpath(["extensionsGallery"]; {"serviceUrl": "https://marketplace.visualstudio.com/_apis/public/gallery", "cacheUrl": "https://vscode.blob.core.windows.net/gallery/index", "itemUrl": "https://marketplace.visualstudio.com/items"})' > product.json
          export NODE_ENV=production
          npx gulp vscode-linux-x64-min
          npx gulp vscode-linux-x64-build-deb
          npx gulp vscode-linux-x64-build-rpm
          cd ..

      - name: Create Linux packages
        if: steps.check_tags.outputs.should_build == 'yes'
        run: |
          cd VSCode-linux-x64
          tar czf ../VSCode-linux-x64-${{ env.LATEST_MS_TAG }}.tar.gz .
          cd ..
          echo "Linux build completed"

      - name: Upload Linux artifacts
        if: steps.check_tags.outputs.should_build == 'yes'
        uses: actions/upload-artifact@v3
        with:
          name: linux-binaries
          path: |
            *.tar.gz
            vscode/.build/linux/deb/amd64/deb/*.deb
            vscode/.build/linux/rpm/x86_64/*.rpm
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          brew update
          brew install yarn jq zip
          npm install --legacy-peer-deps --no-package-lock

      - name: Get VSCode repository
        run: |
          git clone https://github.com/Microsoft/vscode.git
          cd vscode
          LATEST_MS_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "LATEST_MS_TAG=${LATEST_MS_TAG}" >> $GITHUB_ENV
          echo "Got the latest MS tag: ${LATEST_MS_TAG}"
          git checkout $LATEST_MS_TAG
          cd ..

      - name: Check if build needed
        id: check_tags
        run: |
          if git rev-parse $LATEST_MS_TAG >/dev/null 2>&1; then
            echo "Latest MS tag ${LATEST_MS_TAG} already exists in NeoAI. Skipping build"
            echo "should_build=no" >> $GITHUB_OUTPUT
          else
            echo "New MS tag found, continuing build"
            git config --local user.name "GitHub Actions"
            git config --local user.email "action@github.com"
            git tag $LATEST_MS_TAG
            echo "should_build=yes" >> $GITHUB_OUTPUT
          fi

      - name: Build VSCode macOS
        if: steps.check_tags.outputs.should_build == 'yes'
        run: |
          cd vscode
          npm install -g yarn gulp-cli
          yarn
          mv product.json product.json.bak
          cat product.json.bak | jq 'setpath(["extensionsGallery"]; {"serviceUrl": "https://marketplace.visualstudio.com/_apis/public/gallery", "cacheUrl": "https://vscode.blob.core.windows.net/gallery/index", "itemUrl": "https://marketplace.visualstudio.com/items"})' > product.json
          export NODE_ENV=production
          npx gulp vscode-darwin-min
          cd ..

      - name: Create macOS package
        if: steps.check_tags.outputs.should_build == 'yes'
        run: |
          cd VSCode-darwin
          zip -r ../VSCode-darwin-${{ env.LATEST_MS_TAG }}.zip ./*
          cd ..
          echo "macOS build completed"

      - name: Upload macOS artifacts
        if: steps.check_tags.outputs.should_build == 'yes'
        uses: actions/upload-artifact@v3
        with:
          name: macos-binaries
          path: |
            *.zip
          retention-days: 30

  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.zip
            **/*.tar.gz
            **/*.deb
            **/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
